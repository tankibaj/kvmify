# /etc/nginx/sites-available/kvmify
server {
    listen 80;
    server_name _;

    # React frontend (static SPA build)
    location / {
        root /var/www/kvmify;
        try_files $uri $uri/ /index.html;
    }

    # FastAPI backend — trailing slash strips the /api/ prefix, so
    # /api/vms -> backend /vms (backend serves routes at root).
    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # noVNC WebSocket proxy (websockify on :6080)
    location /novnc/ {
        proxy_pass http://127.0.0.1:6080/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
